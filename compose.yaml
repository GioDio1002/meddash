services:
  frontend-app:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4173:80"
    profiles: ["app"]

  backend-app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: development
      APP_PORT: 8000
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/meddash
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      - postgres
      - redis
      - otel-collector
    ports:
      - "8000:8000"
    profiles: ["app"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: meddash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.124.0
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    volumes:
      - ./infra/otel/collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  jaeger:
    image: jaegertracing/all-in-one:1.67.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
